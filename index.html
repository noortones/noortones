<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#006400">
<title>Noor Tons</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- HEADER -->
<header class="header">
  <div class="left">
    <span class="logo">NOOR TONES</span>
  </div>

<div class="right">
  <!-- Home -->
  <a href="index.html">
    <i class="fa-solid fa-house"></i>
  </a>

  <!-- YouTube -->
  <a href="https://www.youtube.com/">
    <i class="fa-brands fa-youtube"></i>
  </a>

  <!-- Instagram -->
  <a href="https://www.instagram.com/">
    <i class="fa-brands fa-instagram"></i>
  </a>
</div>
</header>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" placeholder="Search ringtone...🔍">
  <span></span>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- FOOTER -->
<footer class="footer">
  <h2>Noor Tons</h2>
  <p>Free Islamic Ringtones download karein. Naat, Nasheed, Azan tones available.</p>
  <p>📧 noortones@email.com</p>
</footer>

</div>

<script>

const container = document.getElementById("list");
let currentAudio=null;

for(let i=1;i<=100;i++){

container.innerHTML+=`
<div class="card">

<div class="play" onclick="playAudio(${i},this)">▶</div>

<div class="info">
<div class="title">Ringtone ${i}</div>

<div class="progress-bar">
<div class="progress" id="progress${i}"></div>
</div>

<div class="time" id="time${i}">0:00</div>

<audio id="audio${i}" src="tones/tone${(i%5)+1}.mp3"></audio>
</div>

<div class="actions">
<button onclick="openPage(${i})">⬇</button>
<button>🔗</button>
<button>❤️</button>
</div>

</div>
`;

if(i%6===0){
container.innerHTML+=`<div class="ad">Ad Space</div>`;
}
}

// PLAY
function playAudio(i,btn){

const audio=document.getElementById("audio"+i);
const progress=document.getElementById("progress"+i);
const time=document.getElementById("time"+i);

if(currentAudio && currentAudio!==audio){
currentAudio.pause();
}

if(audio.paused){
audio.play();
btn.innerText="⏸";
currentAudio=audio;
}else{
audio.pause();
btn.innerText="▶";
}

audio.ontimeupdate=()=>{
let p=(audio.currentTime/audio.duration)*100;
progress.style.width=p+"%";

let s=Math.floor(audio.currentTime);
time.innerText="0:"+(s<10?"0"+s:s);
};
}

// OPEN PAGE
function openPage(id){
location.href="ringtone.html?id="+id;
}

</script>

</body>
</html>
