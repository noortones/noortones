<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Noor Tones</title>
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h1>Noor Tones</h1>
  <div class="social">
    <a href="#">📷</a>
    <a href="#">▶</a>
  </div>
</header>

<!-- ADS_PLACE_HEADER -->
<div class="ad">ADS_PLACE_HEADER</div>

<div id="sideMenu" class="side-menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<div class="categories">
  <span onclick="filterCategory('all')">Trending</span>
  <span onclick="filterCategory('notification')">Notification</span>
  <span onclick="filterCategory('iphone')">iPhone Ringtones</span>
  <span onclick="filterCategory('iphone-notification')">iPhone Notifications</span>
</div>

<div class="search-box">
  <input id="search" placeholder="Search ringtones">
</div>

<section>
  <h2>🔥 Trending Ringtones</h2>
  <!-- ADS_PLACE_TRENDING -->
  <div class="ad">ADS_PLACE_TRENDING</div>
  <div id="trending" class="grid"></div>
</section>

<section>
  <h2>🎵 All Ringtones</h2>
  <!-- ADS_PLACE_ALL -->
  <div class="ad">ADS_PLACE_ALL</div>
  <div id="all" class="grid"></div>
</section>

<footer>
  <!-- ADS_PLACE_FOOTER -->
  <div class="ad">ADS_PLACE_FOOTER</div>
  <p>© 2026 Noor Tones</p>
</footer>

<script src="./script.js"></script>
</body>
</html>
