<!DOCTYPE html>
<html>
<head>
<title>My Ringtones</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My Ringtones</h1>

<div id="ringtone-list"></div>

<script>

fetch("ringtones.json")
.then(res => res.json())
.then(data => {

let container = document.getElementById("ringtone-list");

data.forEach(r => {

let div = document.createElement("div");

div.innerHTML = `
<h3>${r.title}</h3>

<audio controls src="${r.file}"></audio>

<br>

<a href="${r.file}" download>Download</a>

<hr>
`;

container.appendChild(div);

});

});

</script>

</body>
</html>
