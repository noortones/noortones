<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Noor Tones</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div class="logo-text">Noor Tones</div>
  <div class="social">
    <img src="./images/instagram.png" alt="Instagram">
    <img src="./images/youtube.png" alt="YouTube">
  </div>
</header>
  
<!-- ===== Side Menu ===== -->
<div class="side-menu" id="side-menu">
  <a href="#">Home</a>
  <a href="#">Saved</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<!-- ===== Ads Header Placeholder ===== -->
<div class="ad">ADS_PLACE_HEADER</div>

<!-- ===== Tags / Pages ===== -->
<div class="categories">
  <span data-tag="Islamic">Islamic</span>
  <span data-tag="Nasheed">Nasheed</span>
  <span data-tag="Naat">Naat</span>
  <span data-tag="iPhone">iPhone</span>
</div>
<div class="categories">
  <span data-tag="Notification">Notification</span>
  <span data-tag="IslamicNotification">Islamic Notification</span>
  <span data-tag="InstagramViral">Instagram Viral</span>
</div>

<!-- ===== Search Bar ===== -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search ringtone...">
  <span class="search-icon">🔍</span>
</div>

<!-- ===== Ringtone Cards ===== -->
<div class="grid" id="grid-container"></div>

<!-- ===== Ads Footer Placeholder ===== -->
<div class="ad">ADS_PLACE_FOOTER</div>

<!-- ===== Footer ===== -->
<footer>
  © 2026 Noor Tones
</footer>

<script src="./script.js"></script>
</body>
</html>
