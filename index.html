<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test</title>

<body>

<h2>Cards Test</h2>

<div id="list"></div>

<script src="data.js"></script>

<script>
function render(){
  const container = document.getElementById("list");

  container.innerHTML = "";

  songs.forEach((s)=>{
    container.innerHTML += `
      <div style="border:1px solid black; margin:5px; padding:10px;">
        ${s.name}
      </div>
    `;
  });
}

// WAIT थोड़ा (important)
setTimeout(()=>{
  if(typeof songs !== "undefined"){
    render();
  }else{
    document.body.innerHTML += "❌ data.js load nahi hua";
  }
},200);
</script>

</body>
</html>
