<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#006400">
<title>Download</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header class="header">
  <div class="left">
    <button onclick="goBack()" class="back">⬅</button>
    <span class="logo">NOOR TONES</span>
  </div>

  <div class="right">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="https://youtube.com" target="_blank" class="nav-btn">YouTube</a>
    <a href="https://instagram.com" target="_blank" class="nav-btn">Instagram</a>
  </div>
</header>

<div id="main"></div>

<div class="ad">Ad Space</div>

<h3 style="padding:10px;">Related</h3>
<div id="related"></div>

<footer class="footer">
  <h2>Noor Tons</h2>
  <p>Best Islamic ringtone platform with fast download.</p>
</footer>

</div>

<script>

function goBack(){ history.back(); }

const id=new URLSearchParams(location.search).get("id")||1;

// MAIN CARD
document.getElementById("main").innerHTML=`
<div class="big-card">

<h2>Ringtone ${id}</h2>

<audio id="player" src="tones/tone${(id%5)+1}.mp3"></audio>

<div class="controls">
<button onclick="play()">▶</button>

<div class="bar">
<div id="progress"></div>
</div>

<span id="time">0:00</span>
</div>

<div class="btns">
<button class="download" onclick="download()">Download</button>
<button class="share" onclick="sharePage(${id})">Share</button>
</div>

</div>
`;

// RELATED
const rel=document.getElementById("related");

for(let i=1;i<=10;i++){
if(i!=id){
rel.innerHTML+=`
<div class="card" onclick="openPage(${i})">
Ringtone ${i}
</div>`;
}
}

function openPage(i){
location.href="ringtone.html?id="+i;
}

// PLAYER
const audio=document.getElementById("player");
const progress=document.getElementById("progress");
const time=document.getElementById("time");

function play(){
audio.paused?audio.play():audio.pause();
}

audio.ontimeupdate=()=>{
let p=(audio.currentTime/audio.duration)*100;
progress.style.width=p+"%";

let s=Math.floor(audio.currentTime);
time.innerText="0:"+(s<10?"0"+s:s);
};

// DOWNLOAD
function download(){
alert("Ad loading...");
setTimeout(()=>{
window.open(audio.src);
},1200);
}

// SHARE
function sharePage(id){
const url = location.origin + "/ringtone.html?id=" + id;

if(navigator.share){
navigator.share({title:"Noor Tons",url:url});
}else{
navigator.clipboard.writeText(url);
alert("Link copied!");
}
}

</script>

</body>
</html>
