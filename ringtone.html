<!DOCTYPE html>
<html>
<head>
<title>Download</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>NOOR TONES</h2>
<a href="index.html">⬅ Back</a>
</header>

<div id="main"></div>

<div class="ad">Ad Space</div>

<footer>
<p>Download best ringtones fast 🚀</p>
</footer>

<script>

const url = new URLSearchParams(window.location.search);
const file = url.get("file");
const name = url.get("name");

document.getElementById("main").innerHTML = `
<h2>${name}</h2>

<audio controls src="${file}"></audio>

<br><br>

<a href="${file}" download class="download">⬇ Download</a>
<button onclick="share()">🔗 Share</button>
`;

function share(){
navigator.share ? navigator.share({url:location.href}) :
alert("Copy link!");
}

</script>

</body>
</html>
