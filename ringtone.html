<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Download Ringtone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header class="header">
  NOOR TONES
</header>

<div id="main"></div>

<div class="ad">Ad Space</div>

<h3 style="padding:10px;">More Ringtones</h3>

<div class="grid">

<div class="card" onclick="openPage(0)">Ringtone 1</div>
<div class="card" onclick="openPage(1)">Ringtone 2</div>
<div class="card" onclick="openPage(2)">Ringtone 3</div>

</div>

</div>

<script>

const songs=[
"tone1.mp3",
"tone2.mp3",
"tone3.mp3",
"tone4.mp3"
];

const id=new URLSearchParams(location.search).get("id");

document.getElementById("main").innerHTML=`
<h2 style="padding:10px;">Ringtone ${Number(id)+1}</h2>

<audio controls src="${songs[id]}" style="width:100%"></audio>

<br><br>

<button onclick="download('${songs[id]}')">Download</button>
<button onclick="share()">Share</button>
<button onclick="save()">❤️ Save</button>
`;

function openPage(i){
  location.href="ringtone.html?id="+i;
}

function download(file){
  alert("Ad loading...");
  setTimeout(()=>{window.open(file)},1000);
}

function share(){
  alert("Link copied");
}

function save(){
  alert("Saved ❤️");
}

</script>

</body>
</html>
