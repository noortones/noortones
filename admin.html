<!DOCTYPE html>
<html>
<head>
<title>Upload</title>
</head>

<body>

<h2>Upload Ringtone</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="file" placeholder="File name (test.mp3)"><br><br>

<button onclick="upload()">Upload</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCO918f489CV0N8O9oC4pTEnZX5n9RYUeI",
  authDomain: "noor--tones.firebaseapp.com",
  databaseURL: "https://noor--tones-default-rtdb.firebaseio.com/",
  projectId: "noor--tones",
  appId: "1:618513611591:web:7591d35887caec60fe6a62"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.upload = ()=>{

let name = document.getElementById("name").value;
let file = document.getElementById("file").value;

push(ref(db,"ringtones"),{
name:name,
file:"tones/"+file
});

alert("Done ✅");

};

</script>

</body>
</html>
